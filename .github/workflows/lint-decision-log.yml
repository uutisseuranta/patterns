name: Lint DECISION_LOG

on:
  pull_request:
    paths:
      - "DECISION_LOG.csv"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Tarkista header
        run: |
          HEADER=$(head -1 DECISION_LOG.csv)
          EXPECTED="id,date,title,decision,rationale,affects_repos"
          if [ "$HEADER" != "$EXPECTED" ]; then
            echo "❌ Header väärä."
            echo "   Odotettu: $EXPECTED"
            echo "   Löytyi:   $HEADER"
            exit 1
          fi
          echo "✅ Header OK"

      - name: Tarkista duplikaatti-ID:t
        run: |
          DUPES=$(tail -n +2 DECISION_LOG.csv \
            | cut -d',' -f1 \
            | sort \
            | uniq -d)
          if [ -n "$DUPES" ]; then
            echo "❌ Duplikaatti-ID:t löytyi:"
            echo "$DUPES"
            exit 1
          fi
          echo "✅ Ei duplikaatteja"

      - name: Tarkista ID-formaatti (K-NNN)
        run: |
          INVALID=$(tail -n +2 DECISION_LOG.csv \
            | cut -d',' -f1 \
            | grep -vE '^K-[0-9]{3}$' || true)
          if [ -n "$INVALID" ]; then
            echo "❌ Virheellinen ID-formaatti (odotettu K-NNN):"
            echo "$INVALID"
            exit 1
          fi
          echo "✅ ID-formaatit OK"

      - name: Tarkista päivämääräformaatti (YYYY-MM-DD)
        run: |
          INVALID=$(tail -n +2 DECISION_LOG.csv \
            | cut -d',' -f2 \
            | grep -vE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' || true)
          if [ -n "$INVALID" ]; then
            echo "❌ Virheellinen päivämääräformaatti (odotettu YYYY-MM-DD):"
            echo "$INVALID"
            exit 1
          fi
          echo "✅ Päivämääräformaatit OK"

      - name: Tarkista pakolliset kentät (ei tyhjiä id/date/title/decision)
        run: |
          FAIL=0
          while IFS=',' read -r id date title decision rationale affects; do
            if [ -z "$id" ] || [ -z "$date" ] || [ -z "$title" ] || [ -z "$decision" ]; then
              echo "❌ Pakollinen kenttä puuttuu rivillä: $id"
              FAIL=1
            fi
          done < <(tail -n +2 DECISION_LOG.csv)
          [ $FAIL -eq 0 ] && echo "✅ Pakolliset kentät OK"
          exit $FAIL
