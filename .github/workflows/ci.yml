# CI Validation
# Vastuu: Suorittaa automaattiset HTML- ja CSS-tarkistukset jokaisessa pull requestissa ja push-tapahtumassa main-haaraan.
# Työkalut: Stylelint (CSS-syntaksi/BEM) ja W3C HTML Nu Checker API (HTML-rakenne).
# Estää mergauksen jos jokin tarkistus epäonnistuu.

name: CI Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Stylelint (CSS validation)
      run: npm run test:css

    - name: Run W3C HTML Validation
      run: npm run test:html
